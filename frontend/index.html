<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estimación de Dislexia – Dictado</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=OpenDyslexic&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔊 Dictado para Estimación de Dislexia</h1>
      <p class="disclaimer">⚠️ Herramienta de tamizaje – No reemplaza un diagnóstico clínico.</p>
    </header>

    <main>
      <!-- Selector de ejemplos -->
      <section class="selector-area">
        <label for="ejemploSelect">Selecciona un texto de ejemplo:</label>
        <select id="ejemploSelect">
          <option value="1">Ejemplo 1 – El perro y el oso</option>
          <option value="2">Ejemplo 2 – El libro de Francisco</option>
          <option value="3">Ejemplo 3 – La visita a la abuela</option>
        </select>
      </section>

      <!-- Reproductor de audio -->
      <section class="audio-controls">
        <button id="btnPlayAudio" aria-label="Reproducir / Pausar">▶ Reproducir</button>
        <span id="tiempoActual">0:00</span> / <span id="tiempoTotal">0:00</span>
        <div class="speed-control">
          <label for="speedSelect">Velocidad:</label>
          <select id="speedSelect">
            <option value="0.75">0.75x</option>
            <option value="1.0" selected>1.0x</option>
            <option value="1.25">1.25x</option>
          </select>
        </div>
        <audio id="audioPlayer" preload="metadata" style="display:none;"></audio>
      </section>

      <!-- Área de texto -->
      <section class="input-area">
        <label for="textoInput">Escribe o modifica el texto que escuchaste:</label>
        <textarea id="textoInput" rows="6" placeholder="El texto aparecerá aquí al seleccionar un ejemplo..."></textarea>
        <button id="btnAnalizar" class="primary">🔍 Analizar Texto</button>
      </section>

      <!-- Resultados -->
      <section id="resultados" class="resultados hidden">
        <h2>Resultado del Análisis</h2>
        <div id="textoOriginalDisplay" class="texto-original"></div>
        <div id="scoreDisplay" class="score"></div>
        <div id="nivelDisplay" class="nivel"></div>
        <div id="erroresList" class="errores-list"></div>
        <div class="disclaimer-final">
          <small>Este resultado es un indicador computacional. Consulte a un especialista para un diagnóstico certero.</small>
        </div>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
